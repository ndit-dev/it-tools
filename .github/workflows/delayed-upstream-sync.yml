name: Delayed upstream sync (14 days)

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/CorentinTh/it-tools.git || true
          git fetch upstream

      - name: Determine safe commit (14 days old)
        run: |
          SAFE_COMMIT=$(git rev-list -n 1 --before="14 days ago" upstream/main)
          echo "SAFE_COMMIT=$SAFE_COMMIT" >> $GITHUB_ENV

      - name: Merge delayed commit
        run: |
          git checkout main
          git merge $SAFE_COMMIT --no-edit

      - name: Push changes
        run: |
          git push origin main
